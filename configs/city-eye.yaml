solution:
    name: city-eye
    batch_size: 16
    use_frame: True
    nms_score_threshold: 0.3
    nms_iou_threshold: 0.45
    xlines_cfg_path: /home/Raspi5_2/ws/nixon/cc-edge-analytics/configs/xlines_cfg.json
    count_output_path: /home/Raspi5_2/ws/nixon/cc-edge-analytics/resources/data/count_result.json
    sqlite_base_dir: /opt/db
    sync_batch_size: 100
    sync_interval_seconds: 10
    sync_topic: sdk/test/python



    tracking:
        track_fps: 30
        track_thresh: 0.4
        track_buffer: 30
        match_thresh: 0.75
        min_box_area: 300

    input: 
        video_width: 1280
        video_height: 720
        video_format: "RGB"
        type: rpi
        file_path: rpi
        # type: file
        # file_path: resources/data/ch01_00000000143000000.mp4
    output:
        type: default
        streaming: true
        streaming_fps: 0.5
        streaming_host: "0.0.0.0"
        streaming_port: 7000
        

    # Cloud configuration
    cloud:
        provider: aws_iot
        client_id: basicPubSub
        endpoint: "a23bd20ty64577-ats.iot.ap-northeast-1.amazonaws.com"
        certs_dir: "/home/Raspi5_2/ws/nixon/cc-edge-analytics/certificates"
        cert_path: "8c78b02040c506b43c1cb6462f24bec7e680832fe2ab9b5abe9ae8eceb72e92a-certificate.pem.crt"
        private_key_path: "8c78b02040c506b43c1cb6462f24bec7e680832fe2ab9b5abe9ae8eceb72e92a-private.pem.key"
        root_ca_path: "AmazonRootCA1.pem"
