name: Deploy to EC2

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
    
    - name: Setup known_hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Create application directory
      run: |
        ssh ubuntu@${{ secrets.EC2_HOST }} "mkdir -p ~/frontend-app"
    
    - name: Deploy to EC2
      run: |
        # Create a tar of the source code
        git archive --format=tar HEAD | gzip > app-source.tar.gz

        # Copy the source code to EC2
        scp app-source.tar.gz ubuntu@${{ secrets.EC2_HOST }}:~/frontend-app/

        # SSH into EC2 and deploy
        ssh ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          cd ~/frontend-app
          
          # Extract the source code
          tar -xzf app-source.tar.gz

          # Build the Docker image with version tag
          docker build -t platform-frontend:latest .

          # Stop and remove existing container if it exists
          docker stop platform-frontend-container || true
          docker rm platform-frontend-container || true

          # Run the new container
          docker run -d --name platform-frontend-container -p 3000:3000 platform-frontend:latest

          # Clean up
          rm app-source.tar.gz
        EOF
