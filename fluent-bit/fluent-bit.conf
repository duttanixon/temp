[SERVICE]
    Flush        180
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    # Buffer configuration for reliability
    storage.path              /var/log/fluent-bit-buffer
    storage.sync              normal
    storage.checksum          off
    storage.backlog.mem_limit 10M

# APPLICATION LOGS - JSON structured logs
[INPUT]
    Name              tail
    Tag               logs.application
    Path              /var/log/edge-analytics/edge-analytics-structured.json
    Parser            json_parser
    DB                /var/log/fluent-bit-state-app.db
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    Refresh_Interval  10
    Read_From_Head    False

# CPU METRICS
[INPUT]
    Name          cpu
    Tag           rpi.cpu
    Interval_Sec  240

# MEMORY METRICS
[INPUT]
    Name          mem
    Tag           rpi.mem
    Interval_Sec  240


# TEMPERATURE METRICS
[INPUT]
    Name          exec
    Tag           rpi.temperature
    Command       /usr/local/bin/get_temperatures.sh
    Interval_Sec  240
    Parser        temperature_parser

# SYSTEM LOGS (optional - for debugging)
[INPUT]
    Name              tail
    Tag               logs.system
    Path              /var/log/syslog
    Parser            syslog_parser
    DB                /var/log/fluent-bit-state-sys.db
    Mem_Buf_Limit     2MB
    Skip_Long_Lines   On
    Refresh_Interval  30

# S3 OUTPUT - Application and system logs
[OUTPUT]
    Name                    s3
    Match                   logs.*
    bucket                  ${EDGE_BUCKET_NAME}
    region                  ${AWS_REGION}
    # Organize by device_id and date for partitioning
    s3_key_format           /logs/device_id=${HOSTNAME}/year=%Y/month=%m/day=%d/${HOSTNAME}_%Y%m%d_%H%M%S_$UUID.json
    s3_key_format_tag_delimiters .-
    # Upload settings
    upload_chunk_size       5M
    upload_timeout          10s
    use_put_object          On
    # Compression
    compression             gzip
    # Content type
    content_type           application/json
    # Retry
    retry_limit            5
    # Buffer
    total_file_size        50M
    # AWS credentials (will be set via environment variables)

# CLOUDWATCH OUTPUT - Keep existing metrics flow to Timestream
[OUTPUT]
    Name                    cloudwatch_logs
    Match                   rpi.*
    region                  ${AWS_REGION}
    log_group_name          /iot-devices/metrics
    log_stream_prefix       ${HOSTNAME}-
    auto_create_group       true
    metric_namespace        RaspberryPi
    profile                 default